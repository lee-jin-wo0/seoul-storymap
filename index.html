<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">

<head>

    <title>서울 히스토리맵, 1919년 3월 그날의 발자취</title>

    <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/section2.css" />
    <link rel="stylesheet" href="./css/section3.css" />
</head>

<body class="global-body">
    <nav class="global-dot-nav">
        <div class="global-dot" data-target-section="1"></div>
        <div class="global-dot" data-target-section="2"></div>
        <div class="global-dot" data-target-section="3"></div>
        <div class="global-dot" data-target-section="4"></div>
        <div class="global-dot" data-target-section="5"></div>
        <div class="global-dot" data-target-section="6"></div>
        <div class="global-dot" data-target-section="7"></div>
    </nav>

    <section data-section="2" class="sc2-section scroll-section" id="section-2">
        <header class="sc2-header">
            <div class="sc2-header-bg"></div>
            <div class="sc2-overlay sc2-overlay-header"></div>
            <div class="sc2-header-content">
                <div class="sc2-chapter-group">
                    <span class="sc2-chapter-num">02</span>
                    <div class="sc2-divider"></div>
                    <span class="sc2-chapter-subtitle">준비과정</span>
                </div>
                <h1 class="sc2-title">세상을 깨울 함성을 준비하다</h1>
                <p class="sc2-desc">역사를 바꾼 그날의 외침 뒤에는, 가장 어두운 밤을 지새운 숭고한 계획이 있었다.</p>
            </div>
        </header>

        <div class="sc2-content-wrap">
            <div class="sc2-map-pane">
                <div class="sc2-map-inner" id="map-s2"></div>
                <div class="sc2-map-shadow"></div>
            </div>

            <div class="sc2-timeline-pane" id="sc2-timeline-container">
                <div class="sc2-timeline-list" id="sc2-timeline-list">
                </div>
            </div>
        </div>
    </section>

    <section id="section-3" class="sc3-section scroll-section" data-section="3">
        <header class="sc3-header">
            <div class="sc3-header-bg"></div>
            <div class="sc3-overlay sc3-overlay-header"></div>
            <div class="sc3-header-content">
                <div class="sc3-chapter-group">
                    <span class="sc3-chapter-num">03</span>
                    <div class="sc3-divider"></div>
                    <span class="sc3-chapter-subtitle">이동과정</span>
                </div>
                <h1 class="sc3-title">뜨거운 함성이 거리를 뒤덮다</h1>
                <p class="sc3-desc">독립을 향한 열망은 발걸음이 되어 서울 전역으로 뻗어나갔다.</p>
            </div>
        </header>

        <div class="sc3-content-wrap">
            <div class="sc3-map-pane">
                <div id="map-s3" class="sc3-map-inner"></div>
                <div class="sc3-map-shadow"></div>
            </div>

            <div class="sc3-timeline-pane">
                <div id="sc3-timeline-list" class="sc3-timeline-list">
                </div>
            </div>

    <script src="./js/main.js"></script>
